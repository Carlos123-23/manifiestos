        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      - name: Debug - Verify Azure context
        run: |
          echo "=== Azure Account Info ==="
          az account show 2>&1 || echo "No subscription context available"
          echo "=== ACR_DESTINATION variable ==="
          echo "ACR_DESTINATION=${{ vars.ACR_DESTINATION }}"
