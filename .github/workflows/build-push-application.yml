  send-data-to-elastic-production:
    name: Send build-push production data to data search engine tool
    needs: [container-build-and-push-production]
    if: always() && !cancelled() && 'preproduction' == inputs.environment_type &&
      needs.container-build-and-push-production.result != 'skipped'
    runs-on: ${{ inputs.runner }}
    strategy:
      matrix:
        registries: ${{ fromJSON(needs.container-build-and-push-production.outputs.data-json) }}
      fail-fast: false
    steps:
      - name: Send info to data search engine tool
        uses: santander-group-shared-assets/gln-alm-data-search-engine-application-action@2.0.0
        with:
          component_id: ${{ fromJSON(inputs.env-vars-json).COMPONENT_ID }}
          instance: ${{ fromJSON(inputs.env-vars-json).ELASTICSEARCH_API_URL }}
          alias: ${{ fromJSON(inputs.env-vars-json).ELASTICSEARCH_ALIAS }}
          type: ${{ fromJSON(inputs.env-vars-json).ELASTICSEARCH_TYPE }}
          auth-type: ${{ fromJSON(inputs.env-vars-json).ELASTICSEARCH_AUTH_TYPE }}
          token: ${{ secrets.ELASTICSEARCH_API_KEY_PRO }}
          job-type: 'build-push'
          parameters: >
            {
              "IMAGE":"${{ matrix.registries.image || 'None' }}",
              "IMAGE_URL":"${{ matrix.registries.image_url || 'None' }}",
              "PUSH":"${{ matrix.registries.push || 'None' }}"
            }

  container-build-and-push-certification:
    name: Release container build and push application to certification
    needs: [container-build-and-push]
    if: ${{ 'preproduction' == inputs.environment_type }}
    runs-on: ${{ inputs.runner }}
    environment: certification   
    outputs:
      tag-version: ${{ env.TAG_VERSION }}
      data-json: ${{ steps.push-scan.outputs.data-json || '["None"]' }}
    env:
      MAVEN_OPTS: ${{ fromJSON(inputs.env-vars-json).MAVEN_OPTS }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git-ref }}
          fetch-depth: 0
      - name: Get JFrog access token
        id: jfrog-token
        uses: santander-group-shared-assets/gln-alm-jfrog-oidc-token-action@1.0.1
        with:
          url: ${{ vars.JFROG_PLATFORM_URL }}
          audience: ${{ vars.JFROG_AUDIENCE }}
          provider_name: ${{ vars.JFROG_PROVIDER_NAME }}
      # Java_Maven technology
      - name: Setup Java/Maven tools
        if: ${{ inputs.technology == 'Java_Maven' }}
        uses: santander-group-shared-assets/gln-setup-runner-ohe-action@2.1.0
        with:
          tools_and_versions: >
            java:${{ fromJSON(inputs.env-vars-json).JAVA_VERSION }},
            maven:${{ fromJSON(inputs.env-vars-json).MAVEN_VERSION }},
            gcloud:${{ fromJSON(inputs.env-vars-json).GCLOUD_VERSION }}
          maven_settings: ${{ vars.MAVEN_SETTINGS_TEMPLATE || vars.MAVEN_SETTINGS_URL || fromJSON(inputs.env-vars-json).MAVEN_SETTINGS_URL }}
      - name: Generate artifact files with maven
        if: ${{ inputs.technology == 'Java_Maven' }}
        shell: bash
        run: |
          artifact_native_compilation=${{ fromJSON(inputs.env-vars-json).ARTIFACT_NATIVE_COMPILATION }}
          if [[ $artifact_native_compilation == true ]]; then
            mvn native:compile -Pnative -Dmaven.test.skip=true
          else
            mvn clean package -Dmaven.test.skip=true
          fi
      # Npm technology
      - name: Setup NodeJs tools
        if: ${{ inputs.technology == 'npm' && fromJSON(inputs.env-vars-json).NODE_VERSION != '' }}
        uses: santander-group-shared-assets/gln-setup-runner-ohe-action@2.2.0
        with:
          tools_and_versions: >
            nodejs:${{ fromJSON(inputs.env-vars-json).NODE_VERSION }},
            gcloud:${{ fromJSON(inputs.env-vars-json).GCLOUD_VERSION }}
          npm_settings: ${{ vars.NPM_SETTINGS_TEMPLATE || vars.NPM_SETTINGS_URL || fromJSON(inputs.env-vars-json).NPM_SETTINGS_URL }}
      - name: Prepare artifact files with npm
        if: ${{ inputs.technology == 'npm' }}
        shell: bash
        run: |
          # Project info:
          PACKAGE_PATH='./'
          PATH_TO_FILE="${{ fromJSON(inputs.env-vars-json).NPM_LIBRARY_DIRECTORY }}"
          if [ ! -f "$PATH_TO_FILE" ]; then
            PACKAGE_PATH=$PATH_TO_FILE/
          fi
          application_name="$(jq -r '.name' $PACKAGE_PATH""package.json)"
          if [[ "$application_name" == "@"* && "$application_name" == *"/"* ]]; then
            # sets the name and group from name
            application_name=$(echo $application_name | sed 's:.*/::')
          fi
          version="$(jq -r '.version' $PACKAGE_PATH""package.json)"
          ARTIFACT_PATH=./$application_name-$version.zip
          CONFIG_PATH=./$application_name-$version-config.zip
          echo "ARTIFACT_PATH=$ARTIFACT_PATH" >> $GITHUB_ENV
          echo "CONFIG_PATH=$CONFIG_PATH" >> $GITHUB_ENV

          # Run npm install and build
          ${{ fromJSON(inputs.env-vars-json).NPM_RUN_INSTALL_COMMAND }} && ${{ fromJSON(inputs.env-vars-json).NPM_RUN_BUILD_COMMAND }}
      - name: Generate Npm Artifact Zip
        if: ${{ inputs.technology == 'npm' }}
        run: |
          cd ${{ fromJSON(inputs.env-vars-json).NPM_APPLICATION_DIST_DIRECTORY }}
          zip -r ${GITHUB_WORKSPACE}/${{env.ARTIFACT_PATH}} ${{ fromJSON(inputs.env-vars-json).NPM_APPLICATION_DIST_CONTENT }}
      - name: Generate Npm Config Zip
        if: ${{ inputs.technology == 'npm' }}
        run: |
          if [[ -d "${{ fromJSON(inputs.env-vars-json).NPM_CONFIGURATION_DIST_DIRECTORY }}" ]]; then
            zip -r ${GITHUB_WORKSPACE}/${{env.CONFIG_PATH}} ${{ fromJSON(inputs.env-vars-json).NPM_CONFIGURATION_DIST_DIRECTORY }}/${{ fromJSON(inputs.env-vars-json).NPM_CONFIGURATION_DIST_CONTENT }}
          else
            echo "Configuration directory not found"
          fi
      # Python technology
      - name: Setup Python tools
        if: inputs.technology == 'python'
        uses: santander-group-shared-assets/gln-setup-runner-ohe-action@2.1.0
        with:
          tools_and_versions: >
            python:${{ fromJSON(inputs.env-vars-json).PYTHON_VERSION }},
            gcloud:${{ fromJSON(inputs.env-vars-json).GCLOUD_VERSION }}
      - name: Generate artifact files with Python
        if: inputs.technology == 'python'
        shell: bash {0}
        run: |
          echo "::debug::PYTHON_BUILD_COMMAND:${{ fromJSON(inputs.env-vars-json).PYTHON_BUILD_COMMAND }}"
          echo "::debug::PYTHON_VIRTUAL_ENVIRONMENT_DIRECTORY:${{ fromJSON(inputs.env-vars-json).PYTHON_VIRTUAL_ENVIRONMENT_DIRECTORY }}"
          echo "::debug::PIP_COMPONENTS_INSTALL_COMMAND:${{ fromJSON(inputs.env-vars-json).PIP_COMPONENTS_INSTALL_COMMAND }}"
          echo "::debug::PYTHON_REQUIREMENTS_PATH:${{ fromJSON(inputs.env-vars-json).PYTHON_REQUIREMENTS_PATH }}"
          echo "::debug::PYTHON_TEST_DIRECTORY:${{ fromJSON(inputs.env-vars-json).PYTHON_TEST_DIRECTORY }}"
          echo "::debug::PYTHON_SKIP_TEST:${{ fromJSON(inputs.env-vars-json).PYTHON_SKIP_TEST }}"
          echo "::debug::PYTHON_TEST_PATH:${{ fromJSON(inputs.env-vars-json).PYTHON_TEST_PATH }}"
          ${{ fromJSON(inputs.env-vars-json).PYTHON_BUILD_COMMAND }}
          python -m venv ${{ fromJSON(inputs.env-vars-json).PYTHON_VIRTUAL_ENVIRONMENT_DIRECTORY }}
          . ${{ fromJSON(inputs.env-vars-json).PYTHON_VIRTUAL_ENVIRONMENT_DIRECTORY }}/bin/activate
          python -m pip install --upgrade pip
          ${{ fromJSON(inputs.env-vars-json).PIP_COMPONENTS_INSTALL_COMMAND }}
          pip install -v -r ${{ fromJSON(inputs.env-vars-json).PYTHON_REQUIREMENTS_PATH }}
          if [[ -d "${{ fromJSON(inputs.env-vars-json).PYTHON_TEST_DIRECTORY }}" ]]; then
            if [[ "${{ fromJSON(inputs.env-vars-json).PYTHON_SKIP_TEST }}" == "false" ]]; then
              export LC_ALL=C.UTF-8
              export LANG=C.UTF-8
              pip install pytest pytest-cov
              python -m pytest --verbose --junit-xml ${{ fromJSON(inputs.env-vars-json).PYTHON_TEST_PATH }} --cov-report=xml --cov
            fi
          fi
      - name: Get project version
        if: inputs.technology == 'python'
        id: python-project-version
        uses: santander-group-shared-assets/gln-alm-version-manager-action@v1.14.0
        with:
          version_file: 'setup.py'
      - name: Generate Python Artifact Zip
        if: ${{ inputs.technology == 'python' }}
        shell: bash {0}
        run: |
          # cd ${{ fromJSON(inputs.env-vars-json).PYTHON_DIST_DIRECTORY }}
          # zip -r ${GITHUB_WORKSPACE}/${{env.ARTIFACT_PATH}} ${{ fromJSON(inputs.env-vars-json).NPM_APPLICATION_DIST_CONTENT }}
          project_name=$(python setup.py --name)
          ARTIFACT_PATH=dist/$project_name-${{ steps.python-project-version.outputs.version }}.tar.gz
          echo "ARTIFACT_PATH=$ARTIFACT_PATH"
          echo "ARTIFACT_PATH=$ARTIFACT_PATH" >> $GITHUB_ENV
  
      - name: Setting tag version
        id: tag
        # Add a logic to update the version when is a main branch and set the new version to the TAG_VERSION variable
        run: |
          if [ -n "${{ inputs.tag-version }}" ]; then
            tag="${{ inputs.tag-version }}"
          else
            tag="${GITHUB_REF##*/}"
          fi
          taguuid=`uuidgen`
          echo "TAG_UUID=${taguuid}" >> $GITHUB_OUTPUT
          echo "TAG_VERSION=$tag" >> $GITHUB_ENV

      - name: Container tool build
        id: 'build'
        run: |
          artifact_native_compilation=${{ fromJSON(inputs.env-vars-json).ARTIFACT_NATIVE_COMPILATION }}
          if [[ $artifact_native_compilation == true ]]; then
            file_name="Dockerfile.native"
          else
            file_name="Dockerfile"
          fi
          buildah bud \
            --file $file_name \
            --format docker \
            --no-cache ${{ fromJSON(inputs.env-vars-json).CONTAINER_BUILD_ARGUMENTS || fromJSON(inputs.env-vars-json).DOCKER_BUILD_ARGUMENTS }} \
            --label "github-commit-hash=${GITHUB_SHA}" \
            --label "github-repository=${GITHUB_REPOSITORY}" \
            --tag ${{ vars.ACR_DESTINATION }}.azurecr.io/${GITHUB_REPOSITORY}:${{ env.TAG_VERSION }} .

      - name: Define operation based on technology input
        id: define-operation
        uses: actions/github-script@v7.0.1
        env:
          TECHNOLOGY: ${{ inputs.technology }}
        with:
          script: |
            let operation;
            switch (process.env.TECHNOLOGY) {
              case 'docker':
                console.log('Operation selected: GET_TYPE_ARTIFACT_STORE_BY_ID to retrieve information from release manager.');
                operation = 'GET_TYPE_ARTIFACT_STORE_BY_ID';
                break;
              default:
                console.log('Using default operation GET_ARTIFACTS_STORE to retrieve information from release manager.');
                operation = 'GET_ARTIFACTS_STORE';
                break;
            }
            core.setOutput('operation', operation);
    
      # - name: Push application to artifact stores
      #   id: 'push-scan'
      #   uses: santander-group-shared-assets/gln-alm-push-application-composite-action@v2.0.0
      #   with:
      #     environment_type: certification
      #     sts_url: ${{ fromJSON(inputs.env-vars-json).STS_LOGIN_URL }}
      #     corporate_login_url: ${{ fromJSON(inputs.env-vars-json).CORPORATE_LOGIN_API_URL }}
      #     corporate_username: ${{ secrets.CORPORATE_LOGIN_USER }}
      #     corporate_password: ${{ secrets.CORPORATE_LOGIN_PASSWORD }}
      #     management_url: ${{ fromJSON(inputs.env-vars-json).MANAGMENT_API_URL }}
      #     repository: ${{ github.server_url }}/${{ github.repository }}
      #     item: ${{ steps.tag.outputs.TAG_UUID }}
      #     tag: ${{ env.TAG_VERSION }}
      #     json_secrets: ${{ toJSON(secrets) }}
      #     release_manager_url: ${{ fromJSON(inputs.env-vars-json).RELEASE_MANAGER_API_URL }}
      #     vault_url: ${{ fromJSON(inputs.env-vars-json).VAULT_INSTANCE }}
      #     operation: ${{ steps.define-operation.outputs.operation }}
      #     component_id: ${{ fromJSON(inputs.env-vars-json).COMPONENT_ID }}
      # - name: Azure CLI Login
      #   uses: azure/login@v2
      #   with:
      #     client-id: ${{ secrets.AZURE_CLIENT_ID }}
      #     tenant-id: ${{ secrets.AZURE_TENANT_ID }}
      #     subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_MI }}
